<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Breakout</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
      font-family: monospace;
    }
    canvas { display: block; }
    #btns {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      width: 100%;
    }
    .btn {
      background: #0f0f2a;
      color: #ccc;
      border: 2px solid #3d5a80;
      border-radius: 8px;
      font-size: 22px;
      padding: 9px 26px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.08s;
    }
    .btn:active, .btn.active { background: #3d5a80; color: #fff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="btns">
  <button class="btn" id="bLeft">◄</button>
  <button class="btn" id="bRight">►</button>
  <button class="btn" id="bHit">HIT</button>
  <button class="btn" id="bPause">Pause</button>
  <button class="btn" id="bWall">Wall</button>
  <button class="btn" id="bSpeedUp">+</button>
  <button class="btn" id="bSpeedDown">−</button>
</div>
<script src="audio.js"></script>
<script src="level-def.js"></script>
<script src="level.js"></script>
<script>
'use strict';

// ─── Constants ─────────────────────────────────────────────────────────────
const CW = 540, CH = 960;   // Portrait
const HUD_H = 76;
const WALL  = 12;

const BW = 66, BH = 43, BGAP = 5;

const FL = WALL;
const FR = CW - WALL;                // rechts immer geschlossen
const FT = HUD_H + WALL;
const FB = CH - WALL - 2 * BH;      // ~2 Steinhöhen über Canvasrand → Fingerzone darunter

const WALL_R        = WALL * 4; // thickness of bottom power-up wall (48 px)
const PAD_H_THICK   = 22;       // paddle thickness (Höhe), immer fix
const WIDE_PAUSE   = 50;   // frames game freezes while paddle grows
const WIDE_SHRINK  = 70;   // frames shrink animation
const HOT_PAUSE    = 55;   // frames game freezes during fireball transformation
const PAD_SPEED  = 6.5;
let padBaseW = 100;             // Basisbreite, wird aus Bild-Aspekt × PAD_H_THICK gesetzt

const BALL_R     = 18;
const BASE_SPEED = 6.6;
const PILL_W = 28, PILL_H = 54, PILL_VY = 2.2;
const ROCKET_SPEED = 14;
const ROCKET_EXPL_R = 5 * (BW + BGAP);
const BOUNCE_BOOST = 0.08; // speed added per bounce, as fraction of base speed
const TRAIL_LEN  = 14;
const BALL_COLORS = ['#7dff8a','#f1c40f','#74b9ff','#e67e22','#a29bfe','#00cec9','#fd79a8','#55efc4'];

const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#27ae60',
  '#16a085','#2980b9','#8e44ad','#e91e63',
  '#ff7675','#fdcb6e','#55efc4','#74b9ff'
];



// ─── Paddle image ──────────────────────────────────────────────────────────
const padImg = new Image();
padImg.src = 'stick_h.png';

// ─── Stone images ──────────────────────────────────────────────────────────
const stoneImgs = ['stone_h.png', 'stone2_h.png', 'stone3_h.png'].map(src => {
  const img = new Image(); img.src = src; return img;
});

// ─── Canvas & Scale ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const g = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;
let scale = 1;

function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const btns = document.getElementById('btns');

  // Buttons kompakt halten – Portrait braucht die Höhe für den Canvas
  const targetBtnH = Math.max(32, Math.min(52, H * 0.07));
  const fs  = Math.max(11, Math.min(18, Math.round(targetBtnH * 0.42)));
  const pv  = Math.max(4,  Math.round(fs * 0.28));
  const ph  = Math.max(8,  Math.round(fs * 0.80));
  const gap = Math.max(4,  Math.round(fs * 0.40));
  btns.style.gap = gap + 'px';
  document.querySelectorAll('.btn').forEach(b => {
    b.style.fontSize = fs + 'px';
    b.style.padding  = pv + 'px ' + ph + 'px';
  });

  // Primär nach Höhe skalieren, Breite als Begrenzung
  const bh = btns.offsetHeight + 8;
  scale = Math.min(W / CW, (H - bh) / CH);
  canvas.style.width  = Math.round(CW * scale) + 'px';
  canvas.style.height = Math.round(CH * scale) + 'px';
}
window.addEventListener('resize', resize);

// ─── Stars ─────────────────────────────────────────────────────────────────
const STAR_SPEED = 2.4; // px per frame (downward scroll speed)
const stars = Array.from({length: 70}, () => ({
  x: Math.random() * CW,
  y: HUD_H + Math.random() * (CH - HUD_H),
  r: 0.4 + Math.random() * 1.4,
  phase: Math.random() * Math.PI * 2,
  spd:   0.018 + Math.random() * 0.028
}));

// ─── Game State ────────────────────────────────────────────────────────────
// READY | PLAYING | PAUSED | BALL_LOST | LEVEL_COMPLETE | GAME_OVER
let state            = 'READY';
let stateBeforePause = null;
let bottomWall        = false;
let score = 0, level = 1, lives = 2;
let speedMult  = 1;
let userSpeed  = 1.0;  // user-controlled multiplier
let userSpeedTouched = false;
let stateTimer = 0;
let frameCount = 0;

// Paddle
const pad = {
  x: (FL + FR) / 2 - Math.round((FR - FL) * 0.11), y: FB - PAD_H_THICK,
  w: Math.round((FR - FL) * 0.154), h: PAD_H_THICK,
  flash: 0
};

function updatePadDimensions() {
  pad.h = PAD_H_THICK;
  if (padImg.naturalWidth && padImg.naturalHeight) {
    // Basisbreite = ~22 % der Feldbreite; Bild wird gestreckt
    padBaseW = Math.round((FR - FL) * 0.154);
    if (wideTimer === 0 && widePauseTimer === 0 && wideShrinkTimer === 0) {
      pad.w = padBaseW;
    }
  }
  pad.y = FB - PAD_H_THICK;
  pad.x = clamp(pad.x, FL, FR - pad.w);
}

// Balls array (supports multiball)
let balls = [];
function makeBall(color = null) {
  return { x: 0, y: 0, vx: 0, vy: 0, r: BALL_R, trail: [], color, fire: 0, transform: 0, flatTimer: 0, baseSpeed: BASE_SPEED };
}

// Particles
let particles = [];

// Power-ups falling on field
let powerUps  = [];
let wideTimer       = 0;   // frames wide paddle active
let widePauseTimer  = 0;   // frames game frozen during growth
let wideShrinkTimer = 0;   // frames shrink animation
const WALL_ANIM     = 45;  // frames for wall appear/disappear animation
let wallPowerTimer  = 0;   // frames timed wall active (600 = 10 s)
let wallAnimIn      = 0;   // appear animation countdown
let wallAnimOut     = 0;   // disappear animation countdown
// fireTimer and transform are now per-ball (b.fire, b.transform)

// Screen shake
let shakeFrames = 0, shakeMag = 0;
let padHoldTimer = 0;
let ballColorIdx = 0;

let bricks = [];
let pill = null;
let pillSpawned = false;
let hasRocket = false;
let rocket = null;
let rocketExplAnim = null;
let healthPill = null;
let healthAnim = [];
let lastBrickHitTimer = 0;

// ─── Particles ─────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 * i / 10) + (Math.random() - 0.5) * 0.6;
    const spd   = 1.2 + Math.random() * 3.8;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life:  1,
      decay: 0.028 + Math.random() * 0.022,
      color,
      size: 3 + Math.random() * 4
    });
  }
}

function spawnBigExplosion(x, y) {
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 12;
    const colors = ['#ff6b35', '#f1c40f', '#ffffff', '#e74c3c', '#ff9f43', '#fd79a8'];
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 3,
      life: 1,
      decay: 0.007 + Math.random() * 0.011,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 5 + Math.random() * 14
    });
  }
}

// ─── Power-ups ─────────────────────────────────────────────────────────────
const PU_TYPES  = ['multiball', 'wide', 'fireball', 'wall'];
const PU_COLORS = { multiball: '#f1c40f', wide: '#3498db', fireball: '#ff6b35', wall: '#00cec9', health: '#2ecc71' };
const PU_LABELS = { multiball: 'Ball', wide: 'BIG', fireball: 'HOT', wall: 'Wall', health: '♥' };

function trySpawnPowerUp(x, y) {
  if (Math.random() < 0.25) {
    const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
    powerUps.push({ x: x - 20, y, w: 40, h: 18, vy: 1.8, type });
  }
}

function activatePowerUp(type) {
  if (type !== 'wide') snd.powerup();
  if (type === 'wide') {
    wideTimer      = 1200;   // 20 seconds
    widePauseTimer = WIDE_PAUSE;
    wideShrinkTimer = 0;
    snd.grow();
  } else if (type === 'wall') {
    const wasActive = wallPowerTimer > 0 || wallAnimIn > 0 || wallAnimOut > 0;
    if (!wasActive) { wallPowerTimer = 300; wallAnimOut = 0; wallAnimIn = WALL_ANIM; }
  } else if (type === 'fireball') {
    for (const b of balls) b.fire = 180;
  } else if (type === 'multiball') {
    const active = balls.filter(b => b.vx !== 0 || b.vy !== 0);
    const ref = active.length > 0 ? active[0] : balls[0];
    if (ref && balls.length < 3) {
      const nb  = makeBall(BALL_COLORS[ballColorIdx++ % BALL_COLORS.length]);
      nb.x = ref.x; nb.y = ref.y;
      const ang = Math.atan2(ref.vy, ref.vx) + 0.45;
      const sp  = Math.hypot(ref.vx, ref.vy) || BASE_SPEED * speedMult;
      nb.baseSpeed = ref.baseSpeed || sp;
      nb.vx = Math.cos(ang) * sp;
      nb.vy = Math.sin(ang) * sp;
      balls.push(nb);
    }
  }
}


// ─── Ball Helpers ──────────────────────────────────────────────────────────
function snapBall() {
  balls = [makeBall()];
  const b = balls[0];
  b.x = pad.x + pad.w / 2;   // Mitte des Schlägers
  b.y = pad.y - b.r - 1;     // direkt oberhalb
}

function launch() {
  if (state !== 'READY') return;
  if (balls.length === 0) balls = [makeBall()];
  const b = balls[0];
  b.x = pad.x + pad.w / 2;
  b.y = pad.y - b.r - 1;
  const angle = (Math.random() * 80 - 40) * Math.PI / 180;  // ±40° von senkrecht
  const sp = BASE_SPEED * speedMult * userSpeed;
  b.baseSpeed = sp;
  b.vx =  Math.sin(angle) * sp;
  b.vy = -Math.cos(angle) * sp;
  state = 'PLAYING';
}

function restart() {
  score = 0; level = 1; lives = 2; speedMult = 1; userSpeed = 1.0; userSpeedTouched = false;
  stateBeforePause = null; bottomWall = false;
  wideTimer = 0; widePauseTimer = 0; wideShrinkTimer = 0;
  wallPowerTimer = 0; wallAnimIn = 0; wallAnimOut = 0;
  pill = null; pillSpawned = false; hasRocket = false; rocket = null; rocketExplAnim = null;
  healthPill = null; healthAnim = []; lastBrickHitTimer = 0;

  pad.x = (FL + FR) / 2 - padBaseW / 2;
  pad.w = padBaseW; pad.h = PAD_H_THICK; pad.flash = 0; updatePadDimensions();
  particles = []; powerUps = [];
  genLevel(1);
  snapBall();
  state = 'READY';
}

function changeSpeed(factor) {
  const prev = userSpeed;
  userSpeed = Math.round(clamp(userSpeed * factor, 0.4, 4.0) * 100) / 100;
  if (userSpeed === prev) return;
  userSpeedTouched = true;
  const ratio = userSpeed / prev;
  for (const b of balls) { b.vx *= ratio; b.vy *= ratio; b.baseSpeed *= ratio; }
}


function launchRocket() {
  if (!hasRocket || rocket) return;
  rocket = { x: pad.x + pad.w / 2, y: pad.y - 5 };
  hasRocket = false;
  snd.rocketLaunch();
}

function togglePause() {
  if (state === 'PLAYING') {
    stateBeforePause = 'PLAYING';
    state = 'PAUSED';
    lastBrickHitTimer = 0;
  } else if (state === 'PAUSED') {
    state = stateBeforePause || 'PLAYING';
    stateBeforePause = null;
  }
}

// ─── Input ─────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowUp' || e.code === 'Enter') {
    e.preventDefault();
    if (hasRocket)             launchRocket();
    else if (state === 'READY')     launch();
    else if (state === 'GAME_OVER') restart();
  }
  if (e.code === 'Space')  { e.preventDefault(); togglePause(); }
  if (e.code === 'KeyW')   bottomWall = !bottomWall;
  if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd')      changeSpeed(1.1);
  if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') changeSpeed(1 / 1.1);
  if (e.key  === '!')      lives++;
  if (e.key  === '§') {
    level++;
    genLevel(level); snapBall(); state = 'READY';
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { delete keys[e.code]; });

// Buttons
const btnState = { left: false, right: false };
function setupPadBtn(el, dir) {
  const on  = () => { btnState[dir] = true;  el.classList.add('active'); };
  const off = () => { btnState[dir] = false; el.classList.remove('active'); };
  el.addEventListener('mousedown',   on);
  el.addEventListener('touchstart',  ev => { ev.preventDefault(); on(); },  { passive: false });
  el.addEventListener('mouseup',     off);
  el.addEventListener('mouseleave',  off);
  el.addEventListener('touchend',    ev => { ev.preventDefault(); off(); }, { passive: false });
  el.addEventListener('touchcancel', ev => { ev.preventDefault(); off(); }, { passive: false });
}
setupPadBtn(document.getElementById('bLeft'),  'left');
setupPadBtn(document.getElementById('bRight'), 'right');

function hitAction() {
  if (hasRocket)             { launchRocket(); return; }
  if (state === 'READY')     launch();
  if (state === 'GAME_OVER') restart();
}
const bHit = document.getElementById('bHit');
bHit.addEventListener('mousedown',  hitAction);
bHit.addEventListener('touchstart', ev => { ev.preventDefault(); hitAction(); }, { passive: false });

const bPause = document.getElementById('bPause');
bPause.addEventListener('mousedown',  togglePause);
bPause.addEventListener('touchstart', ev => { ev.preventDefault(); togglePause(); }, { passive: false });

const bWall = document.getElementById('bWall');
function toggleWall() { bottomWall = !bottomWall; bWall.classList.toggle('active', bottomWall); }
bWall.addEventListener('mousedown',  toggleWall);
bWall.addEventListener('touchstart', ev => { ev.preventDefault(); toggleWall(); }, { passive: false });

const bSpeedUp   = document.getElementById('bSpeedUp');
const bSpeedDown = document.getElementById('bSpeedDown');
bSpeedUp.addEventListener('mousedown',  () => changeSpeed(1.1));
bSpeedUp.addEventListener('touchstart', ev => { ev.preventDefault(); changeSpeed(1.1); }, { passive: false });
bSpeedDown.addEventListener('mousedown',  () => changeSpeed(1 / 1.1));
bSpeedDown.addEventListener('touchstart', ev => { ev.preventDefault(); changeSpeed(1 / 1.1); }, { passive: false });

// Touch on canvas – horizontal drag bewegt Paddle
let tX0 = 0, tXlast = 0, tMoved = false, tTime = 0;
canvas.addEventListener('touchstart', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  tX0 = tXlast = t.clientX; tMoved = false; tTime = Date.now();
}, { passive: false });
canvas.addEventListener('touchmove', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  if (Math.abs(t.clientX - tX0) > 8) tMoved = true;
  const dx = (t.clientX - tXlast) / scale;
  pad.x = clamp(pad.x + dx, FL, FR - pad.w);
  if (state === 'READY') snapBall();
  tXlast = t.clientX;
}, { passive: false });
canvas.addEventListener('touchend', ev => {
  ev.preventDefault();
  if (!tMoved && Date.now() - tTime < 300) {
    if (hasRocket)             launchRocket();
    else if (state === 'READY')     launch();
    else if (state === 'GAME_OVER') restart();
  }
}, { passive: false });

// ─── Utils ─────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ─── State Timer ───────────────────────────────────────────────────────────
function tickState() {
  if (state === 'PAUSED') return;
  if (state === 'BALL_LOST' || state === 'LEVEL_COMPLETE') {
    stateTimer--;
    if (stateTimer <= 0) {
      if (state === 'BALL_LOST') {
        snapBall(); state = 'READY';
      } else {
        level++;
        if (!userSpeedTouched) userSpeed = 1.0;
        wideTimer = 0; widePauseTimer = 0; wideShrinkTimer = 0;
        wallPowerTimer = 0; wallAnimIn = 0; wallAnimOut = 0;
        pill = null; pillSpawned = false; hasRocket = false; rocket = null; rocketExplAnim = null;
        healthPill = null; healthAnim = []; lastBrickHitTimer = 0;
        pad.w = padBaseW; updatePadDimensions();
        for (const b of balls) b.fire = 0;
        genLevel(level); snapBall(); state = 'READY';
      }
    }
  }
}

// ─── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  // Paddle movement with hold-acceleration (horizontal)
  let pdx = 0;
  if (state !== 'PAUSED') {
    if (keys['ArrowLeft']  || btnState.left)  pdx -= 1;
    if (keys['ArrowRight'] || btnState.right) pdx += 1;
  }
  if (pdx !== 0) {
    padHoldTimer += dt;
  } else {
    padHoldTimer = 0;
  }
  // After 0.2 s (12 frames) ramp up to 3× speed over the next ~0.8 s
  const HOLD_START = 12;
  const padSpeedFactor = padHoldTimer > HOLD_START
    ? Math.min(3, 1 + (padHoldTimer - HOLD_START) / 48)
    : 1;
  pad.x = clamp(pad.x + pdx * PAD_SPEED * padSpeedFactor * dt, FL, FR - pad.w);
  pad.y = FB - PAD_H_THICK;
  if (pad.flash > 0) pad.flash -= dt;

  // Wide: kurze Spielpause während Wachstum
  if (widePauseTimer > 0) {
    widePauseTimer -= dt;
    const frac = 1 - Math.max(0, widePauseTimer) / WIDE_PAUSE;
    const bigW = Math.min(Math.round(padBaseW * 1.85), FR - FL - 20);
    const cx = pad.x + pad.w / 2;
    pad.w = Math.round(padBaseW + (bigW - padBaseW) * frac);
    pad.x = clamp(cx - pad.w / 2, FL, FR - pad.w);
    pad.y = FB - PAD_H_THICK;
    return; // Spiel eingefroren während Wachstum
  }
  // Wide: countdown
  if (wideTimer > 0) {
    wideTimer -= dt;
    if (wideTimer <= 0 && wideShrinkTimer === 0) {
      wideShrinkTimer = WIDE_SHRINK;
      snd.shrink();
    }
  }
  // Wide: Schrumpf-Animation (Spiel läuft weiter)
  if (wideShrinkTimer > 0) {
    wideShrinkTimer -= dt;
    const frac = Math.max(0, wideShrinkTimer) / WIDE_SHRINK;
    const bigW = Math.min(Math.round(padBaseW * 1.85), FR - FL - 20);
    const cx = pad.x + pad.w / 2;
    pad.w = Math.round(padBaseW + (bigW - padBaseW) * frac);
    pad.x = clamp(cx - pad.w / 2, FL, FR - pad.w);
    pad.y = FB - PAD_H_THICK;
  }
  // Wall power-up timer + per-ball timers: eingefroren während Pause
  if (state !== 'PAUSED') {
    if (wallAnimIn > 0)  wallAnimIn  -= dt;
    if (wallAnimOut > 0) {
      wallAnimOut -= dt;
      if (wallAnimOut <= 0) wallPowerTimer = 0;
    }
    if (wallPowerTimer > 0) {
      wallPowerTimer -= dt;
      if (wallPowerTimer <= 0 && wallAnimOut === 0) {
        wallAnimOut = WALL_ANIM;
        snd.wallDisappear();
      }
    }
    for (const b of balls) {
      if (b.transform > 0) {
        b.transform -= dt;
        if (b.transform <= 0) b.fire = 180;
      }
      if (b.fire > 0) b.fire -= dt;
    }
  }
  if (shakeFrames > 0) shakeFrames -= dt;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.09 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Power-ups falling
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.y += pu.vy * dt;
    if (pu.x + pu.w > pad.x && pu.x < pad.x + pad.w &&
        pu.y + pu.h > pad.y && pu.y < pad.y + pad.h) {
      activatePowerUp(pu.type);
      powerUps.splice(i, 1);
    } else if (pu.y > CH + 20) {
      powerUps.splice(i, 1);
    }
  }

  // Health pill physics
  if (healthPill) {
    healthPill.y += healthPill.vy * dt;
    if (healthPill.x + healthPill.w > pad.x && healthPill.x < pad.x + pad.w &&
        healthPill.y + healthPill.w > pad.y && healthPill.y < pad.y + pad.h) {
      lives++;
      snd.healthCatch();
      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1 + Math.random() * 5;
        healthAnim.push({
          x: healthPill.x + healthPill.w / 2, y: pad.y,
          vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 4,
          life: 1, decay: 0.018 + Math.random() * 0.015,
          color: ['#2ecc71','#f1c40f','#ffffff','#ff6b81'][Math.floor(Math.random()*4)],
          size: 4 + Math.random() * 6, text: Math.random() < 0.3
        });
      }
      healthPill = null;
    } else if (healthPill.y > CH + 20) {
      healthPill = null;
    }
  }
  // Health anim particles
  for (let i = healthAnim.length - 1; i >= 0; i--) {
    const p = healthAnim[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.06 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) healthAnim.splice(i, 1);
  }

  // Pill physics
  if (pill) {
    pill.y += PILL_VY * dt;
    if (pill.x + PILL_W > pad.x && pill.x < pad.x + pad.w &&
        pill.y + PILL_H > pad.y && pill.y < pad.y + pad.h) {
      for (const b of balls) { spawnExplosion(b.x, b.y, '#ffffff'); snd.ballPop(); }
      balls = [];
      hasRocket = true;
      snd.pillCatch();
      pill = null;
    } else if (pill.y > CH + 20) {
      pill = null;
      lastBrickHitTimer = 0;
    }
  }
  // Rocket pill after 10 s without brick hit
  if (state === 'PLAYING' && !pill && !hasRocket && !rocket) {
    lastBrickHitTimer += dt;
    if (lastBrickHitTimer >= 600 && bricks.some(b => b.alive)) {
      pill = { x: FL + Math.random() * (FR - FL - PILL_W), y: FT - PILL_H };
      pillSpawned = true;
      lastBrickHitTimer = 0;
    }
  }

  // Rocket explosion ring animation
  if (rocketExplAnim) {
    rocketExplAnim.timer -= dt;
    if (rocketExplAnim.timer <= 0) rocketExplAnim = null;
  }
  // Rocket in flight
  if (rocket && state === 'PLAYING') {
    rocket.y -= ROCKET_SPEED * dt;
    if (rocket.y < FT + WALL) {
      const ex = rocket.x, ey = FT + WALL;
      spawnExplosion(ex, ey, '#74b9ff');
      rocketExplAnim = { x: ex, y: ey, timer: 30, maxR: 55 };
      snd.rocketExplode();
      shakeFrames = 20; shakeMag = 10;
      const nb = makeBall();
      nb.x = ex; nb.y = ey + BALL_R + 2;
      const angle = (Math.random() * 80 - 40) * Math.PI / 180;
      const sp = BASE_SPEED * speedMult * userSpeed;
      nb.baseSpeed = sp;
      nb.vx = Math.sin(angle) * sp; nb.vy = Math.cos(angle) * sp;
      balls.push(nb);
      rocket = null;
    }
    else {
      for (const brick of bricks) {
        if (!brick.alive) continue;
        if (rocket.x > brick.x - 4 && rocket.x < brick.x + brick.w + 4 &&
            rocket.y > brick.y - 4 && rocket.y < brick.y + brick.h + 4) {
          const ex = brick.x + brick.w / 2, ey = brick.y + brick.h / 2;
          spawnBigExplosion(ex, ey);
          rocketExplAnim = { x: ex, y: ey, timer: 40, maxR: 100 };
          snd.rocketExplode();
          shakeFrames = 50; shakeMag = 24;
          for (const b2 of bricks) {
            if (!b2.alive) continue;
            const cx = b2.x + b2.w / 2, cy = b2.y + b2.h / 2;
            if (Math.hypot(cx - ex, cy - ey) <= ROCKET_EXPL_R) {
              b2.alive = false; score += 10;
              spawnExplosion(cx, cy, b2.color);
            }
          }
          rocket = null;
          if (bricks.every(b => !b.alive)) {
            state = 'LEVEL_COMPLETE'; stateTimer = 130;
            powerUps = []; pill = null; snd.levelComplete();
          } else {
            lastBrickHitTimer = 0;
            pillSpawned = false;
            const nb = makeBall();
            nb.x = ex; nb.y = ey;
            const angle = (Math.random() * 80 - 40) * Math.PI / 180;
            const sp = BASE_SPEED * speedMult * userSpeed;
            nb.baseSpeed = sp;
            nb.vx = Math.sin(angle) * sp; nb.vy = -Math.cos(angle) * sp;
            balls.push(nb);
          }
          break;
        }
      }
    }
  }

  if (state === 'READY') {
    if (balls.length === 0) balls = [makeBall()];
    const b = balls[0];
    b.x = pad.x + pad.w / 2;
    b.y = pad.y - b.r - 1;
    b.trail = [];
    return;
  }
  if (state !== 'PLAYING') return;

  // Each ball
  let hotTriggered = false;
  for (let bi = balls.length - 1; bi >= 0 && !hotTriggered; bi--) {
    const b = balls[bi];

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LEN) b.trail.shift();

    b.x += b.vx * dt;
    b.y += b.vy * dt;


    // Option A: auto-nudge after 120 frames of near-horizontal movement
    if (Math.abs(b.vy) < Math.abs(b.vx) * 0.18) {
      b.flatTimer = (b.flatTimer || 0) + dt;
      if (b.flatTimer >= 120) {
        const sp = Math.hypot(b.vx, b.vy);
        b.vy = (b.vy <= 0 ? -1 : 1) * sp * 0.3;
        b.flatTimer = 0;
      }
    } else {
      b.flatTimer = 0;
    }

    // Wall collisions – oben/links/rechts immer geschlossen
    if (b.y - b.r < FT) { b.y = FT + b.r; b.vy =  Math.abs(b.vy); snd.wall(); }
    if (b.x - b.r < FL) { b.x = FL + b.r; b.vx =  Math.abs(b.vx); snd.wall();
      if (Math.abs(b.vy) / Math.abs(b.vx) < 0.18) { const sp = Math.hypot(b.vx, b.vy); b.vy += (b.vy <= 0 ? -1 : 1) * sp * 0.25; } }
    if (b.x + b.r > FR) { b.x = FR - b.r; b.vx = -Math.abs(b.vx); snd.wall();
      if (Math.abs(b.vy) / Math.abs(b.vx) < 0.18) { const sp = Math.hypot(b.vx, b.vy); b.vy += (b.vy <= 0 ? -1 : 1) * sp * 0.25; } }

    // Unten: Wall-Power-up oder Ball verloren
    const walled = bottomWall || wallPowerTimer > 0 || wallAnimOut > 0;
    if (walled) {
      if (b.y + b.r > FB) {
        b.y = FB - b.r; b.vy = -Math.abs(b.vy); snd.wall();
      }
    } else {
      if (b.y + b.r > FB + 30) {
        balls.splice(bi, 1);
        if (balls.length === 0) {
          snd.lost();
          lives--;
          shakeFrames = 28; shakeMag = 9;
          wideTimer = 0; widePauseTimer = 0; wideShrinkTimer = 0;
          pill = null; pillSpawned = false; hasRocket = false; rocket = null; rocketExplAnim = null;
          healthPill = null; healthAnim = []; lastBrickHitTimer = 0;
          pad.w = padBaseW; updatePadDimensions();
          balls.forEach(b => { b.fire = 0; b.transform = 0; });
          if (lives < 0) { state = 'GAME_OVER'; }
          else           { state = 'BALL_LOST'; stateTimer = 100; }
        }
        continue;
      }
    }

    // Paddle collision – Ball trifft Paddle von oben
    if (b.vy > 0 &&
        b.y + b.r >= pad.y &&
        b.y - b.r <= pad.y + pad.h &&
        b.x + b.r >= pad.x &&
        b.x - b.r <= pad.x + pad.w) {
      const rel   = (b.x - (pad.x + pad.w / 2)) / (pad.w / 2);  // -1 links … +1 rechts
      const angle = rel * (Math.PI / 3);                           // ±60°
      const sp    = Math.hypot(b.vx, b.vy);
      b.vx =  Math.sin(angle) * sp;
      b.vy = -Math.cos(angle) * sp;   // immer nach oben
      b.y  = pad.y - b.r - 1;
      snd.paddle();
      pad.flash = 14;
      shakeFrames = 6; shakeMag = 3;
    }

    // Brick collisions
    let hitBrick = false;
    for (const brick of bricks) {
      if (!brick.alive || hitBrick) continue;
      if (b.x + b.r > brick.x && b.x - b.r < brick.x + brick.w &&
          b.y + b.r > brick.y && b.y - b.r < brick.y + brick.h) {
        hitBrick = true;
        brick.alive = false;
        score += 10;
        lastBrickHitTimer = 0;
        snd.brick();
        spawnExplosion(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
        shakeFrames = 2; shakeMag = 0.8;
        if (brick.pu === 'multiball' && balls.length < 3) {
          const nb  = makeBall(BALL_COLORS[ballColorIdx++ % BALL_COLORS.length]);
          nb.x = b.x; nb.y = b.y;
          const ang = Math.atan2(b.vy, b.vx) + (Math.random() < 0.5 ? 0.6 : -0.6);
          const sp  = Math.hypot(b.vx, b.vy);
          nb.baseSpeed = b.baseSpeed;
          nb.vx = Math.cos(ang) * sp;
          nb.vy = Math.sin(ang) * sp;
          balls.push(nb);
        } else if (brick.pu === 'wide' && wideTimer === 0 && widePauseTimer === 0 && wideShrinkTimer === 0) {
          activatePowerUp('wide');
        } else if (brick.pu === 'fireball' && b.fire <= 0 && b.transform <= 0) {
          // Burst all other balls with explosion + pop sound
          for (let k = balls.length - 1; k >= 0; k--) {
            if (balls[k] !== b) {
              spawnExplosion(balls[k].x, balls[k].y, '#ff6b35');
              snd.ballPop();
              balls.splice(k, 1);
            }
          }
          // Start per-ball transformation animation (game keeps running)
          b.transform = HOT_PAUSE;
          hotTriggered = true;
          snd.fireStart();
          break; // exit brick loop (outer ball loop exits via hotTriggered)
        } else if (brick.pu === 'wall') {
          const wasActive = wallPowerTimer > 0 || wallAnimIn > 0 || wallAnimOut > 0;
          if (!wasActive) { wallPowerTimer = 300; wallAnimOut = 0; wallAnimIn = WALL_ANIM; snd.wallAppear(); }
        } else if (brick.pu === 'health' && !healthPill) {
          const coinD = 32;
          healthPill = { x: brick.x + brick.w / 2 - coinD / 2, y: brick.y + brick.h, w: coinD, vy: 2.0 };
        }
        // Fireball: pass through without reflecting
        if (b.fire > 0) continue;
        const oL = (b.x + b.r) - brick.x;
        const oR = (brick.x + brick.w) - (b.x - b.r);
        const oT = (b.y + b.r) - brick.y;
        const oB = (brick.y + brick.h) - (b.y - b.r);
        const m  = Math.min(oL, oR, oT, oB);
        if (m === oL || m === oR) b.vx = -b.vx; else b.vy = -b.vy;
      }
    }
  }

  // Level complete?
  if (state === 'PLAYING' && bricks.every(b => !b.alive)) {
    state = 'LEVEL_COMPLETE'; stateTimer = 130;
    powerUps = []; snd.levelComplete();
  }
}

// ─── Draw ──────────────────────────────────────────────────────────────────
function draw(dt) {
  frameCount++;

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeFrames > 0) {
    sx = (Math.random() - 0.5) * shakeMag * 2;
    sy = (Math.random() - 0.5) * shakeMag * 2;
  }
  g.save();
  g.translate(sx, sy);

  // Background
  g.fillStyle = '#07071a';
  g.fillRect(-20, -20, CW + 40, CH + 40);

  drawStars(dt);
  drawWalls();
  drawBricks();
  drawParticles();
  drawRocketExplAnim();
  drawPowerUps();
  drawPill();
  drawHealthPill();
  drawHealthAnim();
  drawPaddle();
  drawRocketOnPad();
  drawRocketInFlight();
  drawBalls();
  drawHUD();
  drawOverlays();

  g.restore();
}

function drawStars(dt) {
  for (const s of stars) {
    s.y += STAR_SPEED * dt;
    if (s.y > CH) {
      s.y = HUD_H;
      s.x = Math.random() * CW;
    }
    const b = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(frameCount * s.spd + s.phase));
    g.beginPath();
    g.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    g.fillStyle = `rgba(200,215,255,${(b * 0.65).toFixed(2)})`;
    g.fill();
  }
}

function drawPill() {
  if (!pill) return;
  const cx = pill.x + PILL_W / 2;
  const cy = pill.y + PILL_H / 2;
  const rx = PILL_W / 2, ry = PILL_H / 2;
  const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.12);
  g.save();
  g.shadowColor = `rgba(100,180,255,${(0.4 + 0.4 * pulse).toFixed(2)})`;
  g.shadowBlur  = 14 + pulse * 10;
  const gr = g.createRadialGradient(cx - rx * 0.2, cy - ry * 0.25, 2, cx, cy, Math.max(rx, ry));
  gr.addColorStop(0,    '#ffffff');
  gr.addColorStop(0.35, `rgba(${Math.floor(100 + pulse * 60)},${Math.floor(160 + pulse * 60)},255,1)`);
  gr.addColorStop(1,    '#1a3a8a');
  g.beginPath();
  g.moveTo(cx, cy - ry); g.lineTo(cx + rx, cy);
  g.lineTo(cx, cy + ry); g.lineTo(cx - rx, cy);
  g.closePath();
  g.fillStyle = gr; g.fill();
  g.shadowBlur = 0;
  g.beginPath();
  g.moveTo(cx - rx * 0.15, cy - ry * 0.55); g.lineTo(cx + rx * 0.25, cy - ry * 0.55);
  g.lineTo(cx + rx * 0.10, cy - ry * 0.15); g.lineTo(cx - rx * 0.30, cy - ry * 0.15);
  g.closePath();
  g.fillStyle = `rgba(255,255,255,${(0.45 + 0.25 * pulse).toFixed(2)})`; g.fill();
  g.beginPath();
  g.moveTo(cx, cy - ry); g.lineTo(cx + rx, cy);
  g.lineTo(cx, cy + ry); g.lineTo(cx - rx, cy);
  g.closePath();
  g.strokeStyle = `rgba(180,220,255,${(0.6 + 0.3 * pulse).toFixed(2)})`;
  g.lineWidth = 1.5; g.stroke();
  g.restore();
}

function drawHealthPill() {
  if (!healthPill) return;
  const cx = healthPill.x + healthPill.w / 2;
  const cy = healthPill.y + healthPill.w / 2;
  const r  = healthPill.w / 2 * (1 + 0.08 * Math.sin(frameCount * 0.13));
  const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.13);
  g.save();
  g.shadowColor = `rgba(255,0,60,${(0.6 + 0.4 * pulse).toFixed(2)})`;
  g.shadowBlur  = 14 + pulse * 12;
  // Heart path
  function heartPath() {
    g.beginPath();
    g.moveTo(cx, cy + r * 0.75);
    g.bezierCurveTo(cx - r * 1.5, cy + r * 0.1, cx - r * 1.5, cy - r * 0.85, cx, cy - r * 0.25);
    g.bezierCurveTo(cx + r * 1.5, cy - r * 0.85, cx + r * 1.5, cy + r * 0.1, cx, cy + r * 0.75);
    g.closePath();
  }
  const gr = g.createRadialGradient(cx, cy - r * 0.1, 1, cx, cy + r * 0.2, r * 1.4);
  gr.addColorStop(0,   '#ff6088');
  gr.addColorStop(0.5, '#e8002a');
  gr.addColorStop(1,   '#8a0018');
  heartPath(); g.fillStyle = gr; g.fill();
  g.shadowBlur = 0;
  heartPath(); g.strokeStyle = 'rgba(255,80,100,0.7)'; g.lineWidth = 1.5; g.stroke();
  // Glanzpunkt
  g.beginPath();
  g.ellipse(cx - r * 0.4, cy - r * 0.35, r * 0.28, r * 0.15, -0.6, 0, Math.PI * 2);
  g.fillStyle = `rgba(255,255,255,${(0.45 + 0.3 * pulse).toFixed(2)})`; g.fill();
  g.restore();
}

function drawHealthAnim() {
  for (const p of healthAnim) {
    g.save();
    g.globalAlpha = Math.max(0, p.life);
    if (p.text) {
      g.fillStyle = '#2ecc71';
      g.font = `bold ${Math.round(p.size * 2)}px monospace`;
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText('+1♥', p.x, p.y);
    } else {
      g.fillStyle = p.color;
      g.beginPath();
      g.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
      g.fill();
    }
    g.restore();
  }
}


function drawRocketOnPad() {
  if (!hasRocket) return;
  drawRocketShape(pad.x + pad.w / 2, pad.y - 32, false);
}

function drawRocketInFlight() {
  if (!rocket) return;
  drawRocketShape(rocket.x, rocket.y, true);
}

function drawRocketShape(x, y, inFlight) {
  g.save();
  g.translate(x, y);
  // Body
  g.fillStyle = '#c0392b';
  g.fillRect(-7, -18, 14, 28);
  // Nose cone
  g.beginPath(); g.moveTo(-7, -18); g.lineTo(7, -18); g.lineTo(0, -34); g.closePath();
  g.fillStyle = '#e74c3c'; g.fill();
  // Fins
  g.fillStyle = '#7f8c8d';
  g.beginPath(); g.moveTo(-7, 6); g.lineTo(-16, 18); g.lineTo(-7, 18); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(7, 6);  g.lineTo(16, 18);  g.lineTo(7, 18);  g.closePath(); g.fill();
  // Window
  g.beginPath(); g.arc(0, -8, 5, 0, Math.PI * 2);
  g.fillStyle = '#74b9ff'; g.fill();
  g.strokeStyle = '#2980b9'; g.lineWidth = 1.5; g.stroke();
  // Exhaust flame
  if (inFlight) {
    const fl = 0.5 + 0.5 * Math.sin(frameCount * 0.5);
    g.beginPath();
    g.moveTo(-5, 10); g.lineTo(5, 10); g.lineTo(0, 20 + fl * 14); g.closePath();
    g.fillStyle = `rgba(255,${Math.floor(140 + fl * 100)},0,0.92)`; g.fill();
    g.beginPath();
    g.moveTo(-3, 10); g.lineTo(3, 10); g.lineTo(0, 14 + fl * 8); g.closePath();
    g.fillStyle = '#ffffff'; g.fill();
  }
  g.restore();
}

function drawRocketExplAnim() {
  if (!rocketExplAnim) return;
  const { x, y, timer, maxR } = rocketExplAnim;
  const prog = 1 - timer / 40;
  for (let i = 0; i < 3; i++) {
    const rp = ((prog * 2 + i * 0.4) % 1);
    const radius = rp * maxR;
    const alpha = (1 - rp) * 0.8;
    g.beginPath();
    g.arc(x, y, radius, 0, Math.PI * 2);
    g.strokeStyle = `rgba(255,${Math.floor(200 - rp * 150)},0,${alpha.toFixed(2)})`;
    g.lineWidth = 4 - rp * 3;
    g.stroke();
  }
  // Central flash
  if (prog < 0.35) {
    const flashAlpha = (1 - prog / 0.35) * 0.9;
    g.beginPath(); g.arc(x, y, maxR * 0.5 * (prog / 0.35), 0, Math.PI * 2);
    g.fillStyle = `rgba(255,255,200,${flashAlpha.toFixed(2)})`; g.fill();
  }
}

function drawHUD() {
  g.fillStyle = '#0f0f2a';
  g.fillRect(-20, 0, CW + 40, HUD_H);
  g.fillStyle = '#3d5a80';
  g.fillRect(-20, HUD_H - 2, CW + 40, 2);

  // Hauptzeile: Score | Level | Life  (44 px, gekürzte Labels)
  g.font = 'bold 44px monospace';
  g.textAlign = 'left';
  g.fillStyle = '#d0d8ff';
  g.fillText(String(score).padStart(6, '0'), 14, HUD_H - 10);

  g.textAlign = 'center';
  g.fillText('L' + String(level).padStart(2, '0'), CW / 2, HUD_H - 10);

  g.textAlign = 'right';
  g.fillStyle = lives === 0 ? '#e74c3c' : '#d0d8ff';
  g.fillText('\u2665' + lives, CW - 14, HUD_H - 10);

  // Power-up timers + Wall-Timer (obere Zeile, 16 px)
  let px = 14;
  g.font = 'bold 16px monospace';
  g.textAlign = 'left';
  if (wideTimer > 0 || widePauseTimer > 0 || wideShrinkTimer > 0) {
    g.fillStyle = wideShrinkTimer > 0 ? '#e67e22' : PU_COLORS.wide;
    const label = widePauseTimer > 0 ? 'BIG!' : wideShrinkTimer > 0 ? 'BIG\u2192' : 'BIG ' + Math.ceil(wideTimer / 60) + 's';
    g.fillText(label, px, 20);
    px += 90;
  }
  const maxFire = balls.reduce((m, b) => Math.max(m, b.fire || 0), 0);
  if (maxFire > 0) {
    g.fillStyle = PU_COLORS.fireball;
    g.fillText('HOT ' + Math.ceil(maxFire / 60) + 's', px, 20);
    px += 90;
  }
  { const activeBall = balls.find(b => b.vx !== 0 || b.vy !== 0);
    const sp = activeBall ? Math.hypot(activeBall.vx, activeBall.vy) : BASE_SPEED * speedMult * userSpeed;
    const ratio = sp / BASE_SPEED;
    g.fillStyle = ratio > speedMult * userSpeed + 0.05 ? '#f1c40f' : ratio < speedMult * userSpeed - 0.05 ? '#74b9ff' : '#d0d8ff';
    g.fillText('SPD ' + ratio.toFixed(2) + 'x', px, 20); }
  if (wallPowerTimer > 0 || wallAnimIn > 0 || wallAnimOut > 0) {
    const secs = wallPowerTimer > 0 ? Math.ceil(wallPowerTimer / 60) : 0;
    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.18);
    g.fillStyle = wallAnimOut > 0
      ? `rgba(255,100,100,${pulse.toFixed(2)})`
      : `rgba(0,206,201,${pulse.toFixed(2)})`;
    g.textAlign = 'right';
    g.fillText('Wall ' + secs + 's', CW - 14, 20);
  }
}

function drawWalls() {
  // Statische Wände: oben, links, rechts (immer geschlossen)
  g.fillStyle = '#1e3a5f';
  g.fillRect(0,  HUD_H, CW, WALL);            // oben
  g.fillRect(0,  HUD_H, WALL, CH - HUD_H);    // links
  g.fillRect(FR, HUD_H, WALL, CH - HUD_H);    // rechts

  // Untere Wand: manuell (grün) oder Power-up (teal, animiert links→rechts→Mitte)
  const timedActive = wallPowerTimer > 0 || wallAnimIn > 0 || wallAnimOut > 0;
  if (bottomWall) {
    g.fillStyle = '#2a5f3a';
    g.fillRect(FL, FB, FR - FL, WALL);
  }
  if (timedActive) {
    const halfW = (FR - FL) / 2;
    let prog = 1, alpha = 1;
    if (wallAnimIn > 0) {
      prog  = 1 - wallAnimIn / WALL_ANIM;
      alpha = prog;
    } else if (wallAnimOut > 0) {
      prog  = wallAnimOut / WALL_ANIM;
      alpha = prog * (Math.floor(frameCount) % 5 < 3 ? 1 : 0.15);
    }
    const segW = prog * halfW;
    // wächst von links+rechts zur Mitte (einblenden) / zieht sich zur Mitte zurück (ausblenden)
    const segs = [
      { x: FL,          w: segW },
      { x: FR - segW,   w: segW },
    ];
    g.save();
    g.globalAlpha = Math.max(0, Math.min(1, alpha));
    for (const { x, w } of segs) {
      if (w <= 0) continue;
      g.fillStyle = '#007f72';
      g.fillRect(x, FB, w, WALL_R);
      g.fillStyle = '#00cec9';
      g.fillRect(x, FB + 2, w, WALL_R - 4);
      g.fillStyle = 'rgba(0,255,240,0.30)';
      g.fillRect(x, FB, w, 3);
      // Glow nach oben
      const grd = g.createLinearGradient(0, FB - 18, 0, FB);
      grd.addColorStop(0, 'rgba(0,206,201,0)');
      grd.addColorStop(1, 'rgba(0,206,201,0.25)');
      g.fillStyle = grd;
      g.fillRect(x, FB - 18, w, 18);
    }
    g.restore();
  }

  // Highlights
  g.fillStyle = 'rgba(255,255,255,0.13)';
  g.fillRect(0,  HUD_H, CW, 2);
  g.fillRect(0,  HUD_H, 2, CH - HUD_H);
  g.fillRect(FR, HUD_H, 2, CH - HUD_H);
  g.fillStyle = 'rgba(0,0,0,0.4)';
  g.fillRect(0,        HUD_H + WALL - 2, CW, 2);
  g.fillRect(WALL - 2, HUD_H, 2, CH - HUD_H);
  g.fillRect(FR + WALL - 2, HUD_H, 2, CH - HUD_H);
}

function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    const img = stoneImgs[b.stoneIdx];
    const stoneReady = img.complete && img.naturalWidth;

    g.save();
    g.beginPath();
    g.rect(b.x, b.y, b.w, b.h);
    g.clip();

    if (stoneReady) {
      g.drawImage(img, b.x, b.y, b.w, b.h);
      g.globalCompositeOperation = 'multiply';
      g.fillStyle = b.color;
      g.fillRect(b.x, b.y, b.w, b.h);
      g.globalCompositeOperation = 'source-over';
    } else {
      g.fillStyle = b.color;
      g.fillRect(b.x, b.y, b.w, b.h);
    }

    // Highlights
    g.fillStyle = 'rgba(255,255,255,0.30)';
    g.fillRect(b.x, b.y, b.w, 4);
    g.fillStyle = 'rgba(0,0,0,0.28)';
    g.fillRect(b.x, b.y + b.h - 4, b.w, 4);

    g.restore();

    g.strokeStyle = 'rgba(0,0,0,0.45)';
    g.lineWidth = 1;
    g.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);

    // Power-up indicator
    if (b.pu) {
      const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.12 + b.x);
      const s = 8;
      const ix = b.x + b.w / 2 - s / 2;
      const iy = b.y + b.h / 2 - s / 2;
      g.fillStyle = PU_COLORS[b.pu];
      g.globalAlpha = pulse;
      g.fillRect(ix, iy, s, s);
      g.globalAlpha = 1;
      g.fillStyle = '#fff';
      g.font = 'bold 14px monospace';
      g.textAlign = 'center';
      g.fillText(PU_LABELS[b.pu], b.x + b.w / 2, b.y + b.h / 2 + 5);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    g.globalAlpha = Math.max(0, p.life);
    g.fillStyle = p.color;
    g.beginPath();
    g.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;
}

function drawPowerUps() {
  for (const pu of powerUps) {
    g.fillStyle = PU_COLORS[pu.type];
    g.fillRect(pu.x, pu.y, pu.w, pu.h);
    g.fillStyle = 'rgba(255,255,255,0.32)';
    g.fillRect(pu.x + 2, pu.y + 2, pu.w - 4, 5);
    g.fillStyle = '#fff';
    g.font = 'bold 10px monospace';
    g.textAlign = 'center';
    g.fillText(PU_LABELS[pu.type], pu.x + pu.w / 2, pu.y + pu.h / 2 + 4);
  }
}

function drawPaddle() {
  updatePadDimensions();
  const flashAmt = pad.flash > 0 ? Math.min(1, pad.flash / 10) : 0;

  if (padImg.complete && padImg.naturalWidth) {
    g.drawImage(padImg, pad.x, pad.y, pad.w, pad.h);
  } else {
    // Fallback wenn Bild noch nicht geladen
    g.fillStyle = '#7eb8d4';
    g.fillRect(pad.x, pad.y, pad.w, pad.h);
  }

  if (flashAmt > 0) {
    g.fillStyle = `rgba(255,255,255,${(flashAmt * 0.65).toFixed(2)})`;
    g.fillRect(pad.x, pad.y, pad.w, pad.h);
  }
}

function drawBalls() {
  for (const b of balls) {
    const isFire = b.fire > 0;
    // Trail
    for (let i = 0; i < b.trail.length; i++) {
      const t    = b.trail[i];
      const frac = i / b.trail.length;      // 0 = oldest, 1 = newest
      const a    = frac * 0.55;             // older = more transparent
      g.beginPath();
      g.arc(t.x, t.y, b.r, 0, Math.PI * 2);
      const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.25);
      g.fillStyle = isFire
        ? `rgba(${Math.floor(180+pulse*60)},${Math.floor(pulse*40)},0,${a.toFixed(2)})`
        : b.color
          ? `rgba(20,110,40,${a.toFixed(2)})`
          : `rgba(60,70,140,${a.toFixed(2)})`;
      g.fill();
    }
    // Glow for fireball
    if (isFire) {
      g.beginPath();
      g.arc(b.x, b.y, b.r + 7, 0, Math.PI * 2);
      g.fillStyle = 'rgba(255,110,0,0.22)';
      g.fill();
    }
    // Ball
    const gr = g.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, b.r);
    if (isFire) {
      const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.25);
      const mid   = Math.floor(80 + pulse * 120);
      gr.addColorStop(0,   '#ffffff');
      gr.addColorStop(0.3, `rgb(255,${mid},${Math.floor(pulse * 40)})`);
      gr.addColorStop(1,   `rgb(${180 + Math.floor(pulse*40)},0,0)`);
    } else if (b.color) {
      gr.addColorStop(0,   '#eeffee');
      gr.addColorStop(0.5, '#7dff8a');
      gr.addColorStop(1,   '#2db840');
    } else {
      gr.addColorStop(0,   '#ffffff');
      gr.addColorStop(0.6, '#d8d8ee');
      gr.addColorStop(1,   '#8888aa');
    }
    g.beginPath();
    g.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    g.fillStyle = gr;
    g.fill();
  }

  // Fireball transformation animation (per-ball, runs while game plays)
  for (const hb of balls) {
    if (hb.transform <= 0) continue;
    const prog = 1 - hb.transform / HOT_PAUSE; // 0→1 over transformation
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.55);

    // Expanding ignition rings
    for (let r = 0; r < 3; r++) {
      const ringProg = ((prog * 3 + r) % 1);
      const radius   = hb.r + 6 + ringProg * 28;
      const alpha    = (1 - ringProg) * 0.7;
      g.beginPath();
      g.arc(hb.x, hb.y, radius, 0, Math.PI * 2);
      g.strokeStyle = `rgba(255,${Math.floor(80 + pulse * 80)},0,${alpha.toFixed(2)})`;
      g.lineWidth = 2.5;
      g.stroke();
    }

    // Growing orange glow
    const glowR = hb.r + 4 + prog * 14;
    g.beginPath();
    g.arc(hb.x, hb.y, glowR, 0, Math.PI * 2);
    g.fillStyle = `rgba(255,90,0,${(0.12 + prog * 0.18 + pulse * 0.08).toFixed(2)})`;
    g.fill();

    // Ball surface bleaches to white then to fire colour
    const tgr = g.createRadialGradient(hb.x - 3, hb.y - 3, 1, hb.x, hb.y, hb.r);
    const heat = Math.floor(prog * 255);
    tgr.addColorStop(0,   '#ffffff');
    tgr.addColorStop(0.4, `rgb(255,${Math.max(0, 200 - heat)},0)`);
    tgr.addColorStop(1,   `rgb(${Math.max(120, 220 - heat)},0,0)`);
    g.beginPath();
    g.arc(hb.x, hb.y, hb.r, 0, Math.PI * 2);
    g.fillStyle = tgr;
    g.fill();
  }
}

function dimField() {
  g.fillStyle = 'rgba(0,0,10,0.62)';
  g.fillRect(FL, FT, FR - FL, FB - FT);
}

function drawOverlays() {
  const mx = (FL + FR) / 2;
  const my = (FT + FB) / 2;

  if (hasRocket) {
    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.15);
    g.fillStyle = `rgba(255,${Math.floor(120 + pulse * 80)},0,${pulse.toFixed(2)})`;
    g.font = 'bold 15px monospace';
    g.textAlign = 'center';
    g.fillText('\u2191 \u00B7 HIT \u00B7 Tap = Fire Rocket!', mx, FB - PAD_H_THICK - BALL_R * 3);
  }
  if (state === 'READY') {
    g.fillStyle = 'rgba(255,255,255,0.35)';
    g.font = '13px monospace';
    g.textAlign = 'center';
    g.fillText('\u2191 \u00B7 HIT \u00B7 Tap = Launch', mx, FB - PAD_H_THICK - BALL_R * 3);
    return;
  }
  if (state === 'BALL_LOST') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#e74c3c';
    g.font = 'bold 34px monospace';
    g.fillText('Life Lost!', mx, my - 12);
    g.fillStyle = '#aaa';
    g.font = '18px monospace';
    g.fillText(lives + ' ' + (lives === 1 ? 'life' : 'lives') + ' remaining', mx, my + 22);
  }
  if (state === 'LEVEL_COMPLETE') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#f1c40f';
    g.font = 'bold 38px monospace';
    g.fillText('Level ' + level + ' Complete!', mx, my - 14);
    g.fillStyle = '#ccc';
    g.font = '18px monospace';
    g.fillText('Level ' + (level + 1) + ' starting soon\u2026', mx, my + 22);
  }
  if (state === 'GAME_OVER') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#e74c3c';
    g.font = 'bold 52px monospace';
    g.fillText('GAME OVER', mx, my - 28);
    g.fillStyle = '#f1c40f';
    g.font = 'bold 20px monospace';
    g.fillText('Score: ' + String(score).padStart(6, '0'), mx, my + 10);
    g.fillStyle = '#999';
    g.font = '15px monospace';
    g.fillText('\u2191 \u00B7 HIT \u00B7 Tap = Restart', mx, my + 42);
  }
  if (state === 'PAUSED') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#74b9ff';
    g.font = 'bold 44px monospace';
    g.fillText('PAUSE', mx, my - 14);
    g.fillStyle = '#aaa';
    g.font = '16px monospace';
    g.fillText('Space \u00B7 Pause = Continue', mx, my + 24);
  }
}

// ─── Loop ──────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 16.667, 2);
  lastTs = ts;
  tickState();
  update(dt);
  draw(dt);
  requestAnimationFrame(loop);
}

// ─── Init ──────────────────────────────────────────────────────────────────
resize();
genLevel(1);
snapBall();
padImg.onload = () => { updatePadDimensions(); snapBall(); };
requestAnimationFrame(loop);
</script>
