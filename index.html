<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Krakout</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
      font-family: monospace;
    }
    canvas { display: block; }
    #btns {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }
    .btn {
      background: #0f0f2a;
      color: #ccc;
      border: 2px solid #3d5a80;
      border-radius: 8px;
      font-size: 22px;
      padding: 9px 26px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.08s;
    }
    .btn:active, .btn.active { background: #3d5a80; color: #fff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="btns">
  <button class="btn" id="bUp">▲</button>
  <button class="btn" id="bDown">▼</button>
  <button class="btn" id="bHit">HIT</button>
  <button class="btn" id="bPause">Pause</button>
</div>
<script>
'use strict';

// ─── Constants ─────────────────────────────────────────────────────────────
const CW = 800, CH = 560;
const HUD_H = 38;
const WALL  = 12;

const FL = WALL;
const FR = CW;
const FT = HUD_H + WALL;
const FB = CH - WALL;

const PAD_W      = 14;
const PAD_H_BASE = 82;
const PAD_X      = CW - WALL - 3 - PAD_W;
const PAD_SPEED  = 6.5;

const BALL_R     = 11;
const BASE_SPEED = 5.2;
const TRAIL_LEN  = 14;

const BW = 28, BH = 42, BGAP = 5;

const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#27ae60',
  '#16a085','#2980b9','#8e44ad','#e91e63',
  '#ff7675','#fdcb6e','#55efc4','#74b9ff'
];

// ─── Audio ─────────────────────────────────────────────────────────────────
let _actx = null, _noiseBuf = null;

function audio() {
  if (!_actx) {
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    const len = Math.ceil(_actx.sampleRate * 0.5);
    _noiseBuf = _actx.createBuffer(1, len, _actx.sampleRate);
    const d = _noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function mkOsc(ctx, type, freq, t) {
  const o = ctx.createOscillator();
  o.type = type; o.frequency.setValueAtTime(freq, t); return o;
}
function mkEnv(ctx, peak, attack, decay, t) {
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay);
  return g;
}
function mkNoise(ctx, t, dur) {
  const s = ctx.createBufferSource();
  s.buffer = _noiseBuf; s.start(t); s.stop(t + dur); return s;
}
function distCurve(amt) {
  const n = 256, c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    c[i] = (Math.PI + amt) * x / (Math.PI + amt * Math.abs(x));
  }
  return c;
}

const snd = {
  brick() {
    try {
      const ctx = audio(), t = ctx.currentTime;
      const n = mkNoise(ctx, t, 0.07);
      const nf = ctx.createBiquadFilter();
      nf.type = 'bandpass'; nf.frequency.value = 900; nf.Q.value = 1.8;
      const ng = mkEnv(ctx, 0.20, 0.002, 0.065, t);
      n.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
      const o = mkOsc(ctx, 'square', 560, t);
      o.frequency.exponentialRampToValueAtTime(160, t + 0.09);
      const og = mkEnv(ctx, 0.18, 0.001, 0.09, t);
      o.connect(og); og.connect(ctx.destination);
      o.start(t); o.stop(t + 0.10);
    } catch(e) {}
  },
  wall() {
    try {
      const ctx = audio(), t = ctx.currentTime;
      const o = mkOsc(ctx, 'sine', 1400, t);
      o.frequency.exponentialRampToValueAtTime(700, t + 0.05);
      const g = mkEnv(ctx, 0.14, 0.001, 0.05, t);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + 0.06);
      const o2 = mkOsc(ctx, 'sine', 120, t);
      const g2 = mkEnv(ctx, 0.12, 0.001, 0.02, t);
      o2.connect(g2); g2.connect(ctx.destination);
      o2.start(t); o2.stop(t + 0.025);
    } catch(e) {}
  },
  paddle() {
    try {
      const ctx = audio(), t = ctx.currentTime;
      const o1 = mkOsc(ctx, 'sine', 200, t);
      o1.frequency.exponentialRampToValueAtTime(65, t + 0.14);
      const g1 = mkEnv(ctx, 0.40, 0.002, 0.13, t);
      o1.connect(g1); g1.connect(ctx.destination);
      o1.start(t); o1.stop(t + 0.15);
      const o2 = mkOsc(ctx, 'triangle', 1100, t);
      const g2 = mkEnv(ctx, 0.12, 0.001, 0.025, t);
      o2.connect(g2); g2.connect(ctx.destination);
      o2.start(t); o2.stop(t + 0.03);
      const nm = mkNoise(ctx, t, 0.03);
      const nf = ctx.createBiquadFilter();
      nf.type = 'highpass'; nf.frequency.value = 2000;
      const ng = mkEnv(ctx, 0.10, 0.001, 0.025, t);
      nm.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    } catch(e) {}
  },
  lost() {
    try {
      const ctx = audio(), t = ctx.currentTime;
      [[0, 392], [0.16, 294], [0.32, 196]].forEach(([dt, freq]) => {
        const o = mkOsc(ctx, 'sawtooth', freq, t + dt);
        const ws = ctx.createWaveShaper(); ws.curve = distCurve(25);
        const gn = mkEnv(ctx, 0.28, 0.008, 0.13, t + dt);
        o.connect(ws); ws.connect(gn); gn.connect(ctx.destination);
        o.start(t + dt); o.stop(t + dt + 0.18);
      });
      const nm = mkNoise(ctx, t + 0.48, 0.25);
      const nf = ctx.createBiquadFilter();
      nf.type = 'lowpass';
      nf.frequency.setValueAtTime(3000, t + 0.48);
      nf.frequency.exponentialRampToValueAtTime(100, t + 0.73);
      const ng = mkEnv(ctx, 0.18, 0.01, 0.22, t + 0.48);
      nm.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    } catch(e) {}
  },
  powerup() {
    try {
      const ctx = audio(), t = ctx.currentTime;
      [0, 0.10, 0.20].forEach((dt, i) => {
        const freq = [523, 659, 784][i];
        const o = mkOsc(ctx, 'sine', freq, t + dt);
        const gn = mkEnv(ctx, 0.22, 0.01, 0.09, t + dt);
        o.connect(gn); gn.connect(ctx.destination);
        o.start(t + dt); o.stop(t + dt + 0.12);
      });
    } catch(e) {}
  }
};

// ─── Canvas & Scale ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const g = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;
let scale = 1;

function resize() {
  const btns = document.getElementById('btns');
  const bh = btns.offsetHeight + 18;
  scale = Math.min(window.innerWidth / CW, (window.innerHeight - bh) / CH) * 0.97;
  canvas.style.width  = (CW * scale) + 'px';
  canvas.style.height = (CH * scale) + 'px';
}
window.addEventListener('resize', resize);

// ─── Stars ─────────────────────────────────────────────────────────────────
const stars = Array.from({length: 70}, () => ({
  x: Math.random() * CW,
  y: HUD_H + Math.random() * (CH - HUD_H),
  r: 0.4 + Math.random() * 1.4,
  phase: Math.random() * Math.PI * 2,
  spd:   0.018 + Math.random() * 0.028
}));

// ─── Game State ────────────────────────────────────────────────────────────
// READY | PLAYING | PAUSED | BALL_LOST | LEVEL_COMPLETE | GAME_OVER
let state            = 'READY';
let stateBeforePause = null;
let rightWall        = false;
let score = 0, level = 1, lives = 2;
let speedMult  = 1;
let stateTimer = 0;
let frameCount = 0;

// Paddle
const pad = {
  x: PAD_X, y: (FT + FB) / 2 - PAD_H_BASE / 2,
  w: PAD_W, h: PAD_H_BASE,
  flash: 0
};

// Balls array (supports multiball)
let balls = [];
function makeBall() {
  return { x: 0, y: 0, vx: 0, vy: 0, r: BALL_R, trail: [] };
}

// Particles
let particles = [];

// Power-ups falling on field
let powerUps  = [];
let wideTimer = 0;   // frames wide paddle active
let fireTimer = 0;   // frames fireball active

// Screen shake
let shakeFrames = 0, shakeMag = 0;

let bricks = [];

// ─── Particles ─────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 * i / 10) + (Math.random() - 0.5) * 0.6;
    const spd   = 1.2 + Math.random() * 3.8;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life:  1,
      decay: 0.028 + Math.random() * 0.022,
      color,
      size: 3 + Math.random() * 4
    });
  }
}

// ─── Power-ups ─────────────────────────────────────────────────────────────
const PU_TYPES  = ['multiball', 'wide', 'fireball'];
const PU_COLORS = { multiball: '#f1c40f', wide: '#3498db', fireball: '#ff6b35' };
const PU_LABELS = { multiball: 'x3', wide: 'BIG', fireball: 'HOT' };

function trySpawnPowerUp(x, y) {
  if (Math.random() < 0.25) {
    const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
    powerUps.push({ x: x - 20, y, w: 40, h: 18, vy: 1.8, type });
  }
}

function activatePowerUp(type) {
  snd.powerup();
  if (type === 'wide') {
    wideTimer = 600;
    pad.h = Math.min(PAD_H_BASE * 1.85, FB - FT - 4);
    pad.y  = clamp(pad.y, FT, FB - pad.h);
  } else if (type === 'fireball') {
    fireTimer = 480;
  } else if (type === 'multiball') {
    const active = balls.filter(b => b.vx !== 0 || b.vy !== 0);
    const ref    = active.length > 0 ? active[0] : balls[0];
    if (ref) {
      for (let i = 0; i < 2; i++) {
        const nb  = makeBall();
        nb.x = ref.x; nb.y = ref.y;
        const ang = Math.atan2(ref.vy, ref.vx) + (i === 0 ? 0.45 : -0.45);
        const sp  = Math.hypot(ref.vx, ref.vy) || BASE_SPEED * speedMult;
        nb.vx = Math.cos(ang) * sp;
        nb.vy = Math.sin(ang) * sp;
        balls.push(nb);
      }
    }
  }
}

// ─── Level Generation ──────────────────────────────────────────────────────
function genLevel(lvl) {
  bricks = [];
  const stepX = BW + BGAP;
  const stepY = BH + BGAP;
  const ax  = FL + 6,                          ay  = FT + 8;
  const ax2 = PAD_X - Math.round(CW / 4),      ay2 = FB - 8;

  const cols   = Math.floor((ax2 - ax) / stepX);
  const rows   = Math.floor((ay2 - ay) / stepY);
  const totalW = cols * stepX - BGAP;
  const totalH = rows * stepY - BGAP;
  const ox  = ax + ((ax2 - ax) - totalW) / 2;
  const oy  = ay + ((ay2 - ay) - totalH) / 2;
  const gcx = ox + totalW / 2;
  const gcy = oy + totalH / 2;

  function inEll(r, c, rx, ry) {
    const bx = ox + c * stepX + BW / 2;
    const by = oy + r * stepY + BH / 2;
    const nx = (bx - gcx) / rx, ny = (by - gcy) / ry;
    return nx * nx + ny * ny <= 1;
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let place = false;
      if (lvl === 1) {
        place = inEll(r, c, totalW * 0.52, totalH * 0.52) &&
               !inEll(r, c, totalW * 0.28, totalH * 0.28);
      } else if (lvl === 2) {
        const o = inEll(r, c, totalW * 0.52, totalH * 0.52);
        const m = inEll(r, c, totalW * 0.36, totalH * 0.36);
        const i = inEll(r, c, totalW * 0.18, totalH * 0.18);
        place = (o && !m) || i;
      } else if (lvl === 3) {
        place = inEll(r, c, totalW * 0.52, totalH * 0.52);
      } else {
        place = inEll(r, c, totalW * 0.52, totalH * 0.52) && Math.random() > 0.28;
      }
      if (!place) continue;

      let maxHp = 1;
      if (lvl >= 2) maxHp = Math.random() < 0.35 ? 2 : 1;
      if (lvl >= 3) { const rn = Math.random(); maxHp = rn < 0.2 ? 3 : rn < 0.55 ? 2 : 1; }

      bricks.push({
        x: ox + c * stepX, y: oy + r * stepY,
        w: BW, h: BH,
        hp: maxHp, maxHp,
        alive: true,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
  }
}

// ─── Ball Helpers ──────────────────────────────────────────────────────────
function snapBall() {
  balls = [makeBall()];
  const b = balls[0];
  b.x = pad.x - b.r - 1;
  b.y = pad.y + pad.h / 2;
}

function launch() {
  if (state !== 'READY') return;
  if (balls.length === 0) balls = [makeBall()];
  const b = balls[0];
  b.x = pad.x - b.r - 1;
  b.y = pad.y + pad.h / 2;
  const angle = (Math.random() * 80 - 40) * Math.PI / 180;
  const sp = BASE_SPEED * speedMult;
  b.vx = -Math.cos(angle) * sp;
  b.vy =  Math.sin(angle) * sp;
  state = 'PLAYING';
}

function restart() {
  score = 0; level = 1; lives = 2; speedMult = 1;
  stateBeforePause = null; rightWall = false;
  wideTimer = 0; fireTimer = 0;
  pad.y = (FT + FB) / 2 - PAD_H_BASE / 2;
  pad.h = PAD_H_BASE; pad.flash = 0;
  particles = []; powerUps = [];
  genLevel(1);
  snapBall();
  state = 'READY';
}

function togglePause() {
  if (state === 'PLAYING') {
    stateBeforePause = 'PLAYING';
    state = 'PAUSED';
  } else if (state === 'PAUSED') {
    state = stateBeforePause || 'PLAYING';
    stateBeforePause = null;
  }
}

// ─── Input ─────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowLeft' || e.code === 'Enter') {
    e.preventDefault();
    if (state === 'READY')     launch();
    if (state === 'GAME_OVER') restart();
  }
  if (e.code === 'Space')  { e.preventDefault(); togglePause(); }
  if (e.code === 'KeyW')   rightWall = !rightWall;
  if (e.key  === '!')      lives++;
  if (e.key  === '§') {
    level++;
    speedMult = Math.min(1 + (level - 1) * 0.12, 1.8);
    genLevel(level); snapBall(); state = 'READY';
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { delete keys[e.code]; });

// Buttons
const btnState = { up: false, down: false };
function setupPadBtn(el, dir) {
  const on  = () => { btnState[dir] = true;  el.classList.add('active'); };
  const off = () => { btnState[dir] = false; el.classList.remove('active'); };
  el.addEventListener('mousedown',   on);
  el.addEventListener('touchstart',  ev => { ev.preventDefault(); on(); },  { passive: false });
  el.addEventListener('mouseup',     off);
  el.addEventListener('mouseleave',  off);
  el.addEventListener('touchend',    ev => { ev.preventDefault(); off(); }, { passive: false });
  el.addEventListener('touchcancel', ev => { ev.preventDefault(); off(); }, { passive: false });
}
setupPadBtn(document.getElementById('bUp'),   'up');
setupPadBtn(document.getElementById('bDown'), 'down');

function hitAction() {
  if (state === 'READY')     launch();
  if (state === 'GAME_OVER') restart();
}
const bHit = document.getElementById('bHit');
bHit.addEventListener('mousedown',  hitAction);
bHit.addEventListener('touchstart', ev => { ev.preventDefault(); hitAction(); }, { passive: false });

const bPause = document.getElementById('bPause');
bPause.addEventListener('mousedown',  togglePause);
bPause.addEventListener('touchstart', ev => { ev.preventDefault(); togglePause(); }, { passive: false });

// Touch on canvas
let tY0 = 0, tYlast = 0, tMoved = false, tTime = 0;
canvas.addEventListener('touchstart', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  tY0 = tYlast = t.clientY; tMoved = false; tTime = Date.now();
}, { passive: false });
canvas.addEventListener('touchmove', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  if (Math.abs(t.clientY - tY0) > 8) tMoved = true;
  const dy = (t.clientY - tYlast) / scale;
  pad.y = clamp(pad.y + dy, FT, FB - pad.h);
  if (state === 'READY') snapBall();
  tYlast = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', ev => {
  ev.preventDefault();
  if (!tMoved && Date.now() - tTime < 300) {
    if (state === 'READY')     launch();
    if (state === 'GAME_OVER') restart();
  }
}, { passive: false });

// ─── Utils ─────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ─── State Timer ───────────────────────────────────────────────────────────
function tickState() {
  if (state === 'PAUSED') return;
  if (state === 'BALL_LOST' || state === 'LEVEL_COMPLETE') {
    stateTimer--;
    if (stateTimer <= 0) {
      if (state === 'BALL_LOST') {
        snapBall(); state = 'READY';
      } else {
        level++;
        speedMult = Math.min(1 + (level - 1) * 0.12, 1.8);
        genLevel(level); snapBall(); state = 'READY';
      }
    }
  }
}

// ─── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  // Paddle movement
  let pdy = 0;
  if (keys['ArrowUp']   || btnState.up)               pdy -= 1;
  if (keys['ArrowDown'] || keys['KeyS'] || btnState.down) pdy += 1;
  pad.y = clamp(pad.y + pdy * PAD_SPEED * dt, FT, FB - pad.h);
  if (pad.flash > 0) pad.flash -= dt;

  // Timers
  if (wideTimer > 0) { wideTimer -= dt; if (wideTimer <= 0) pad.h = PAD_H_BASE; }
  if (fireTimer > 0) fireTimer -= dt;
  if (shakeFrames > 0) shakeFrames -= dt;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.09 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Power-ups falling
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.y += pu.vy * dt;
    if (pu.x + pu.w > pad.x && pu.x < pad.x + pad.w &&
        pu.y + pu.h > pad.y && pu.y < pad.y + pad.h) {
      activatePowerUp(pu.type);
      powerUps.splice(i, 1);
    } else if (pu.y > CH + 20) {
      powerUps.splice(i, 1);
    }
  }

  if (state === 'READY') {
    if (balls.length === 0) balls = [makeBall()];
    const b = balls[0];
    b.x = pad.x - b.r - 1;
    b.y = pad.y + pad.h / 2;
    b.trail = [];
    return;
  }
  if (state !== 'PLAYING') return;

  // Each ball
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const b = balls[bi];

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LEN) b.trail.shift();

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Wall collisions
    if (b.y - b.r < FT) { b.y = FT + b.r; b.vy =  Math.abs(b.vy); snd.wall(); }
    if (b.y + b.r > FB) { b.y = FB - b.r; b.vy = -Math.abs(b.vy); snd.wall(); }
    if (b.x - b.r < FL) { b.x = FL + b.r; b.vx =  Math.abs(b.vx); snd.wall(); }

    // Right side: wall or exit
    if (rightWall) {
      if (b.x + b.r > CW - WALL) {
        b.x = CW - WALL - b.r; b.vx = -Math.abs(b.vx); snd.wall();
      }
    } else {
      if (b.x - b.r > FR + 30) {
        balls.splice(bi, 1);
        if (balls.length === 0) {
          snd.lost();
          lives--;
          shakeFrames = 28; shakeMag = 9;
          if (lives < 0) { state = 'GAME_OVER'; }
          else           { state = 'BALL_LOST'; stateTimer = 100; }
        }
        continue;
      }
    }

    // Paddle collision
    if (b.vx > 0 &&
        b.x + b.r >= pad.x &&
        b.x - b.r <= pad.x + pad.w &&
        b.y + b.r >= pad.y &&
        b.y - b.r <= pad.y + pad.h) {
      const rel   = (b.y - (pad.y + pad.h / 2)) / (pad.h / 2);
      const angle = rel * (Math.PI / 3);
      const sp    = Math.hypot(b.vx, b.vy);
      b.vx = -Math.cos(angle) * sp;
      b.vy =  Math.sin(angle) * sp;
      b.x  = pad.x - b.r - 1;
      snd.paddle();
      pad.flash = 14;
      shakeFrames = 6; shakeMag = 3;
    }

    // Brick collisions
    let hitBrick = false;
    for (const brick of bricks) {
      if (!brick.alive || hitBrick) continue;
      if (b.x + b.r > brick.x && b.x - b.r < brick.x + brick.w &&
          b.y + b.r > brick.y && b.y - b.r < brick.y + brick.h) {
        hitBrick = true;
        brick.hp--;
        score += 10;
        snd.brick();
        spawnExplosion(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
        shakeFrames = 5; shakeMag = 2;
        if (brick.hp <= 0) {
          brick.alive = false;
          trySpawnPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
        }
        // Fireball: pass through without reflecting
        if (fireTimer > 0) continue;
        const oL = (b.x + b.r) - brick.x;
        const oR = (brick.x + brick.w) - (b.x - b.r);
        const oT = (b.y + b.r) - brick.y;
        const oB = (brick.y + brick.h) - (b.y - b.r);
        const m  = Math.min(oL, oR, oT, oB);
        if (m === oL || m === oR) b.vx = -b.vx; else b.vy = -b.vy;
      }
    }
  }

  // Level complete?
  if (state === 'PLAYING' && bricks.every(b => !b.alive)) {
    state = 'LEVEL_COMPLETE'; stateTimer = 130;
    powerUps = [];
  }
}

// ─── Draw ──────────────────────────────────────────────────────────────────
function draw() {
  frameCount++;

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeFrames > 0) {
    sx = (Math.random() - 0.5) * shakeMag * 2;
    sy = (Math.random() - 0.5) * shakeMag * 2;
  }
  g.save();
  g.translate(sx, sy);

  // Background
  g.fillStyle = '#07071a';
  g.fillRect(-20, -20, CW + 40, CH + 40);

  drawStars();
  drawWalls();
  drawBricks();
  drawParticles();
  drawPowerUps();
  drawPaddle();
  drawBalls();
  drawHUD();
  drawOverlays();

  g.restore();
}

function drawStars() {
  for (const s of stars) {
    const b = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(frameCount * s.spd + s.phase));
    g.beginPath();
    g.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    g.fillStyle = `rgba(200,215,255,${(b * 0.65).toFixed(2)})`;
    g.fill();
  }
}

function drawHUD() {
  g.fillStyle = '#0f0f2a';
  g.fillRect(-20, 0, CW + 40, HUD_H);
  g.fillStyle = '#3d5a80';
  g.fillRect(-20, HUD_H - 2, CW + 40, 2);

  g.font = 'bold 15px monospace';
  g.fillStyle = '#d0d8ff';
  g.textAlign = 'left';
  g.fillText('Score: ' + String(score).padStart(6, '0'), 14, HUD_H - 10);

  g.textAlign = 'center';
  g.fillText('Level: ' + String(level).padStart(3, '0'), CW / 2, HUD_H - 10);

  g.textAlign = 'right';
  g.fillStyle = lives === 0 ? '#e74c3c' : '#d0d8ff';
  g.fillText('Life: ' + lives, CW - 14, HUD_H - 10);

  // Power-up timers in HUD
  let px = 14;
  g.font = 'bold 11px monospace';
  g.textAlign = 'left';
  if (wideTimer > 0) {
    g.fillStyle = PU_COLORS.wide;
    g.fillText('BIG ' + Math.ceil(wideTimer / 60) + 's', px, 12);
    px += 60;
  }
  if (fireTimer > 0) {
    g.fillStyle = PU_COLORS.fireball;
    g.fillText('HOT ' + Math.ceil(fireTimer / 60) + 's', px, 12);
  }
}

function drawWalls() {
  g.fillStyle = '#1e3a5f';
  g.fillRect(0, HUD_H, CW, WALL);
  g.fillRect(0, HUD_H, WALL, CH - HUD_H);
  g.fillRect(0, CH - WALL, CW, WALL);
  if (rightWall) {
    g.fillStyle = '#2a5f3a';
    g.fillRect(CW - WALL, HUD_H, WALL, CH - HUD_H);
  }
  g.fillStyle = 'rgba(255,255,255,0.13)';
  g.fillRect(0, HUD_H, CW, 2);
  g.fillRect(0, HUD_H, 2, CH - HUD_H);
  g.fillRect(0, CH - WALL, CW, 2);
  if (rightWall) g.fillRect(CW - WALL, HUD_H, 2, CH - HUD_H);
  g.fillStyle = 'rgba(0,0,0,0.4)';
  g.fillRect(0, HUD_H + WALL - 2, CW, 2);
  g.fillRect(WALL - 2, HUD_H, 2, CH - HUD_H);
  g.fillRect(0, CH - WALL - 2, CW, 2);
}

function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    g.fillStyle = b.color;
    g.fillRect(b.x, b.y, b.w, b.h);
    // Darken when damaged
    if (b.hp < b.maxHp) {
      g.fillStyle = `rgba(0,0,0,${(0.45 * (1 - b.hp / b.maxHp)).toFixed(2)})`;
      g.fillRect(b.x, b.y, b.w, b.h);
    }
    g.fillStyle = 'rgba(255,255,255,0.38)';
    g.fillRect(b.x, b.y, b.w, 4);
    g.fillStyle = 'rgba(0,0,0,0.32)';
    g.fillRect(b.x, b.y + b.h - 4, b.w, 4);
    g.strokeStyle = 'rgba(0,0,0,0.42)';
    g.lineWidth = 1;
    g.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
    // HP number
    if (b.maxHp > 1) {
      g.fillStyle = 'rgba(255,255,255,0.92)';
      g.font = 'bold 13px monospace';
      g.textAlign = 'center';
      g.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2 + 5);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    g.globalAlpha = Math.max(0, p.life);
    g.fillStyle = p.color;
    g.beginPath();
    g.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;
}

function drawPowerUps() {
  for (const pu of powerUps) {
    g.fillStyle = PU_COLORS[pu.type];
    g.fillRect(pu.x, pu.y, pu.w, pu.h);
    g.fillStyle = 'rgba(255,255,255,0.32)';
    g.fillRect(pu.x + 2, pu.y + 2, pu.w - 4, 5);
    g.fillStyle = '#fff';
    g.font = 'bold 10px monospace';
    g.textAlign = 'center';
    g.fillText(PU_LABELS[pu.type], pu.x + pu.w / 2, pu.y + pu.h / 2 + 4);
  }
}

function drawPaddle() {
  const isWide    = wideTimer > 0;
  const flashAmt  = pad.flash > 0 ? Math.min(1, pad.flash / 10) : 0;

  g.fillStyle = isWide ? '#1a6fa3' : '#7eb8d4';
  g.fillRect(pad.x, pad.y, pad.w, pad.h);
  g.fillStyle = isWide ? '#4ca3d4' : '#c8e6f5';
  g.fillRect(pad.x, pad.y, 3, pad.h);
  g.fillStyle = isWide ? '#0f3d5c' : '#2c4a6e';
  g.fillRect(pad.x + pad.w - 3, pad.y, 3, pad.h);
  g.fillStyle = isWide ? '#4ca3d4' : '#c8e6f5';
  g.fillRect(pad.x, pad.y, pad.w, 3);
  g.fillStyle = isWide ? '#0f3d5c' : '#2c4a6e';
  g.fillRect(pad.x, pad.y + pad.h - 3, pad.w, 3);

  if (flashAmt > 0) {
    g.fillStyle = `rgba(255,255,255,${(flashAmt * 0.75).toFixed(2)})`;
    g.fillRect(pad.x, pad.y, pad.w, pad.h);
  }
}

function drawBalls() {
  const isFire = fireTimer > 0;
  for (const b of balls) {
    // Trail
    for (let i = 0; i < b.trail.length; i++) {
      const t    = b.trail[i];
      const frac = i / b.trail.length;
      const r    = Math.max(1, b.r * frac * 0.75);
      const a    = frac * 0.55;
      g.beginPath();
      g.arc(t.x, t.y, r, 0, Math.PI * 2);
      g.fillStyle = isFire
        ? `rgba(255,${Math.floor(80 + frac * 120)},0,${a.toFixed(2)})`
        : `rgba(160,180,255,${a.toFixed(2)})`;
      g.fill();
    }
    // Glow for fireball
    if (isFire) {
      g.beginPath();
      g.arc(b.x, b.y, b.r + 7, 0, Math.PI * 2);
      g.fillStyle = 'rgba(255,110,0,0.22)';
      g.fill();
    }
    // Ball
    const gr = g.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, b.r);
    if (isFire) {
      gr.addColorStop(0,   '#fff8f0');
      gr.addColorStop(0.4, '#ffaa00');
      gr.addColorStop(1,   '#cc2200');
    } else {
      gr.addColorStop(0,   '#ffffff');
      gr.addColorStop(0.6, '#d8d8ee');
      gr.addColorStop(1,   '#8888aa');
    }
    g.beginPath();
    g.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    g.fillStyle = gr;
    g.fill();
  }
}

function dimField() {
  g.fillStyle = 'rgba(0,0,10,0.62)';
  g.fillRect(FL, FT, FR - FL, FB - FT);
}

function drawOverlays() {
  const mx = (FL + FR) / 2;
  const my = (FT + FB) / 2;

  if (state === 'READY') {
    g.fillStyle = 'rgba(255,255,255,0.35)';
    g.font = '13px monospace';
    g.textAlign = 'center';
    g.fillText('\u2190 \u00B7 HIT \u00B7 Tap = Launch', mx, FB - 14);
    return;
  }
  if (state === 'BALL_LOST') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#e74c3c';
    g.font = 'bold 34px monospace';
    g.fillText('Life Lost!', mx, my - 12);
    g.fillStyle = '#aaa';
    g.font = '18px monospace';
    g.fillText(lives + ' ' + (lives === 1 ? 'life' : 'lives') + ' remaining', mx, my + 22);
  }
  if (state === 'LEVEL_COMPLETE') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#f1c40f';
    g.font = 'bold 38px monospace';
    g.fillText('Level ' + level + ' Complete!', mx, my - 14);
    g.fillStyle = '#ccc';
    g.font = '18px monospace';
    g.fillText('Level ' + (level + 1) + ' starting soon\u2026', mx, my + 22);
  }
  if (state === 'GAME_OVER') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#e74c3c';
    g.font = 'bold 52px monospace';
    g.fillText('GAME OVER', mx, my - 28);
    g.fillStyle = '#f1c40f';
    g.font = 'bold 20px monospace';
    g.fillText('Score: ' + String(score).padStart(6, '0'), mx, my + 10);
    g.fillStyle = '#999';
    g.font = '15px monospace';
    g.fillText('\u2190 \u00B7 HIT \u00B7 Tap = Restart', mx, my + 42);
  }
  if (state === 'PAUSED') {
    dimField();
    g.textAlign = 'center';
    g.fillStyle = '#74b9ff';
    g.font = 'bold 44px monospace';
    g.fillText('PAUSE', mx, my - 14);
    g.fillStyle = '#aaa';
    g.font = '16px monospace';
    g.fillText('Space \u00B7 Pause = Continue', mx, my + 24);
  }
}

// ─── Loop ──────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 16.667, 2);
  lastTs = ts;
  tickState();
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── Init ──────────────────────────────────────────────────────────────────
resize();
genLevel(1);
snapBall();
requestAnimationFrame(loop);
</script>
